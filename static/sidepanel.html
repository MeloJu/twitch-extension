<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Chat</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <main class="layout">
      <header>
        <h1>Twitch Chat</h1>

    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
